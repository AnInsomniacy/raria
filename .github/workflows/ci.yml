# Industrial-grade Rust CI pipeline.
#
# Architecture: Linear gate pipeline — each stage blocks the next.
#
#   fmt ──▶ lint ──▶ test (matrix: ubuntu + macos)
#
# Design decisions:
# - Linear `needs` chain: fail fast on cheap checks before expensive compilation.
# - Single `lint` job combines clippy + check: avoids duplicate compilation.
# - `cargo nextest` for parallel test execution with better output.
# - `Swatinem/rust-cache` on all compilation jobs for dependency caching.
# - `fail-fast: false` on test matrix: see all platform failures, not just the first.
# - `--locked` everywhere: CI must match the committed Cargo.lock.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  # ── Stage 1: Format ─────────────────────────────────────────────────
  # Zero-compilation gate. Rejects style violations in < 10s.
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Stage 2: Lint ───────────────────────────────────────────────────
  # Clippy + workspace check in a single job (shares compilation artifacts).
  # Blocked on fmt — no point linting unformatted code.
  lint:
    name: Lint
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (all targets)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Check (workspace)
        run: cargo check --workspace --locked

  # ── Stage 3: Test ───────────────────────────────────────────────────
  # Cross-platform test matrix. Blocked on lint — no point testing broken code.
  # Uses cargo-nextest for parallel execution and cleaner output.
  test:
    name: Test (${{ matrix.os }})
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Run tests
        run: cargo nextest run --workspace --locked
      # doc-tests are not supported by nextest; run them separately.
      - name: Run doc-tests
        run: cargo test --workspace --locked --doc
