# Industrial-grade Rust CI — DAG pipeline.
#
# Architecture (modeled after tokio-rs/tokio):
#
#   fmt ─┐
#        ├──▶ lint ──┐
#                    ├──▶ test (ubuntu)
#                    └──▶ test (macos)
#
# - fmt: zero-compilation gate (< 10s).
# - lint: clippy + check (shares compile cache).
# - test: cross-platform matrix, fans out in parallel after lint passes.
# - Concurrency group: auto-cancels superseded runs on the same branch/PR.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  # ── Gate: Format ────────────────────────────────────────────────────
  # Zero compilation. Rejects style violations in seconds.
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Gate: Lint ──────────────────────────────────────────────────────
  # Clippy + check in one job (shared compile artifacts).
  # Depends on fmt — no point linting unformatted code.
  lint:
    name: Clippy + Check
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Check
        run: cargo check --workspace --locked

  # ── Fan-out: Test ───────────────────────────────────────────────────
  # Cross-platform matrix, runs in parallel after lint passes.
  # Uses cargo-nextest for parallel test execution.
  test:
    name: Test (${{ matrix.os }})
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Test
        run: cargo nextest run --workspace --locked
      - name: Doc-tests
        run: cargo test --workspace --locked --doc
