# Cross-platform release pipeline.
#
# Produces optimised binaries for 6 targets:
#
#   ┌── linux-x86_64    (ubuntu, native)
#   ├── linux-aarch64   (ubuntu, cross)
#   ├── darwin-x86_64   (macos-13, native)
#   ├── darwin-aarch64  (macos-latest, native)
#   ├── windows-x86_64  (windows, native)
#   └── windows-aarch64 (windows, native)
#
# Triggered by:
#   - Tag push matching `v*` (e.g. v0.1.0)
#   - Manual workflow dispatch
#
# All 6 build jobs fan out in parallel, then a single release job
# collects every artifact and publishes a GitHub Release.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Leave empty to use HEAD as a draft."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ── Build matrix ────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            archive: tar.gz

          # ── macOS ──
          - os: macos-13
            target: x86_64-apple-darwin
            cross: false
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
            archive: tar.gz

          # ── Windows ──
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
            archive: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            cross: false
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Cross is only needed for Linux aarch64.
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      # ── Package ──
      - name: Determine binary name
        id: bin
        shell: bash
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            echo "name=raria.exe" >> "$GITHUB_OUTPUT"
          else
            echo "name=raria" >> "$GITHUB_OUTPUT"
          fi

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          staging="raria-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${{ steps.bin.outputs.name }}" "$staging/"
          cp README.md LICENSE "$staging/" 2>/dev/null || true
          tar czf "${staging}.tar.gz" "$staging"
          echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          staging="raria-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${{ steps.bin.outputs.name }}" "$staging/"
          cp README.md LICENSE "$staging/" 2>/dev/null || true
          7z a "${staging}.zip" "$staging"
          echo "ASSET=${staging}.zip" >> "$GITHUB_ENV"

      # ── Checksum ──
      - name: Generate SHA-256 checksum
        shell: bash
        run: |
          if command -v shasum &>/dev/null; then
            shasum -a 256 "$ASSET" > "${ASSET}.sha256"
          else
            sha256sum "$ASSET" > "${ASSET}.sha256"
          fi
          cat "${ASSET}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          if-no-files-found: error

  # ── Publish GitHub Release ──────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: ls -lhR artifacts/

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [ -z "$TAG" ]; then
              TAG="draft-$(date +%Y%m%d-%H%M%S)"
              echo "draft=true" >> "$GITHUB_OUTPUT"
            else
              echo "draft=false" >> "$GITHUB_OUTPUT"
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: ${{ steps.tag.outputs.draft == 'true' }}
          generate_release_notes: true
          files: artifacts/*
          fail_on_unmatched_files: true
